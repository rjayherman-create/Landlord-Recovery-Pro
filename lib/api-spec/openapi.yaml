openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NY Property Tax Grievance Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: grievances
    description: Property tax grievance operations
  - name: comparables
    description: Comparable property sales operations
  - name: counties
    description: County-specific information
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /grievances:
    get:
      operationId: listGrievances
      tags: [grievances]
      summary: List all grievances
      responses:
        "200":
          description: List of grievances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grievance"
    post:
      operationId: createGrievance
      tags: [grievances]
      summary: Create a new grievance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrievanceRequest"
      responses:
        "201":
          description: Created grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"

  /grievances/{id}:
    get:
      operationId: getGrievance
      tags: [grievances]
      summary: Get a grievance by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Grievance details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateGrievance
      tags: [grievances]
      summary: Update a grievance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGrievanceRequest"
      responses:
        "200":
          description: Updated grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteGrievance
      tags: [grievances]
      summary: Delete a grievance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /comparables:
    get:
      operationId: listComparables
      tags: [comparables]
      summary: List comparables for a grievance
      parameters:
        - name: grievanceId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comparable sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comparable"
    post:
      operationId: addComparable
      tags: [comparables]
      summary: Add a comparable sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComparableRequest"
      responses:
        "201":
          description: Created comparable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comparable"

  /comparables/{id}:
    delete:
      operationId: deleteComparable
      tags: [comparables]
      summary: Delete a comparable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /counties:
    get:
      operationId: listCounties
      tags: [counties]
      summary: List all supported NY counties
      responses:
        "200":
          description: List of counties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/County"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    Grievance:
      type: object
      properties:
        id:
          type: integer
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        ownerMailingAddress:
          type: string
          nullable: true
        propertyAddress:
          type: string
        county:
          type: string
        municipality:
          type: string
        state:
          type: string
          description: "State code: NY or TX"
        schoolDistrict:
          type: string
          nullable: true
        parcelId:
          type: string
          nullable: true
        propertyClass:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        livingArea:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        taxYear:
          type: integer
        currentAssessment:
          type: number
        equalizationRate:
          type: number
          nullable: true
        estimatedMarketValue:
          type: number
        requestedAssessment:
          type: number
        basisOfComplaint:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, submitted, pending, reduced, denied]
        filingDeadline:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - ownerName
        - propertyAddress
        - county
        - municipality
        - state
        - taxYear
        - currentAssessment
        - estimatedMarketValue
        - requestedAssessment
        - status
        - createdAt
        - updatedAt

    CreateGrievanceRequest:
      type: object
      properties:
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        ownerMailingAddress:
          type: string
          nullable: true
        propertyAddress:
          type: string
        county:
          type: string
        municipality:
          type: string
        state:
          type: string
          description: "State code: NY or TX"
        schoolDistrict:
          type: string
          nullable: true
        parcelId:
          type: string
          nullable: true
        propertyClass:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        livingArea:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        taxYear:
          type: integer
        currentAssessment:
          type: number
        equalizationRate:
          type: number
          nullable: true
        estimatedMarketValue:
          type: number
        requestedAssessment:
          type: number
        basisOfComplaint:
          type: string
          nullable: true
        filingDeadline:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - ownerName
        - propertyAddress
        - county
        - municipality
        - taxYear
        - currentAssessment
        - estimatedMarketValue
        - requestedAssessment

    UpdateGrievanceRequest:
      type: object
      properties:
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        ownerMailingAddress:
          type: string
          nullable: true
        propertyAddress:
          type: string
        county:
          type: string
        municipality:
          type: string
        state:
          type: string
          description: "State code: NY or TX"
        schoolDistrict:
          type: string
          nullable: true
        parcelId:
          type: string
          nullable: true
        propertyClass:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        livingArea:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        taxYear:
          type: integer
        currentAssessment:
          type: number
        equalizationRate:
          type: number
          nullable: true
        estimatedMarketValue:
          type: number
        requestedAssessment:
          type: number
        basisOfComplaint:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, submitted, pending, reduced, denied]
        filingDeadline:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    Comparable:
      type: object
      properties:
        id:
          type: integer
        grievanceId:
          type: integer
        address:
          type: string
        salePrice:
          type: number
        saleDate:
          type: string
        squareFeet:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: number
          nullable: true
        assessedValue:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        distance:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - grievanceId
        - address
        - salePrice
        - saleDate
        - createdAt

    CreateComparableRequest:
      type: object
      properties:
        grievanceId:
          type: integer
        address:
          type: string
        salePrice:
          type: number
        saleDate:
          type: string
        squareFeet:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: number
          nullable: true
        assessedValue:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        distance:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - grievanceId
        - address
        - salePrice
        - saleDate

    County:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
        filingPortal:
          type: string
          nullable: true
        formRequired:
          type: string
        grievanceDay:
          type: string
          nullable: true
        deadline:
          type: string
          nullable: true
        notes:
          type: string
        municipalities:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - region
        - formRequired
        - notes
        - municipalities
