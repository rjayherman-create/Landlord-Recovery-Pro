openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NY Property Tax Grievance Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: grievances
    description: Property tax grievance operations
  - name: comparables
    description: Comparable property sales operations
  - name: counties
    description: County-specific information
  - name: cases
    description: Small claims court case operations
  - name: small-claims
    description: Small claims court case operations (alias for /cases)
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /grievances:
    get:
      operationId: listGrievances
      tags: [grievances]
      summary: List all grievances
      responses:
        "200":
          description: List of grievances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grievance"
    post:
      operationId: createGrievance
      tags: [grievances]
      summary: Create a new grievance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGrievanceRequest"
      responses:
        "201":
          description: Created grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"

  /grievances/{id}:
    get:
      operationId: getGrievance
      tags: [grievances]
      summary: Get a grievance by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Grievance details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateGrievance
      tags: [grievances]
      summary: Update a grievance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGrievanceRequest"
      responses:
        "200":
          description: Updated grievance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grievance"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteGrievance
      tags: [grievances]
      summary: Delete a grievance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /comparables:
    get:
      operationId: listComparables
      tags: [comparables]
      summary: List comparables for a grievance
      parameters:
        - name: grievanceId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comparable sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comparable"
    post:
      operationId: addComparable
      tags: [comparables]
      summary: Add a comparable sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComparableRequest"
      responses:
        "201":
          description: Created comparable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comparable"

  /comparables/{id}:
    delete:
      operationId: deleteComparable
      tags: [comparables]
      summary: Delete a comparable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /counties:
    get:
      operationId: listCounties
      tags: [counties]
      summary: List all supported NY counties
      responses:
        "200":
          description: List of counties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/County"

  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List all small claims cases
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmallClaimsCase"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new small claims case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSmallClaimRequest"
      responses:
        "201":
          description: Created case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmallClaimsCase"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get a case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmallClaimsCase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSmallClaimRequest"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmallClaimsCase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: Delete a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cases/{id}/generate-statement:
    post:
      operationId: generateCaseStatement
      tags: [cases]
      summary: Generate an AI-powered statement of claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated statement
          content:
            application/json:
              schema:
                type: object
                properties:
                  statement:
                    type: string
                required:
                  - statement

  /cases/{id}/pdf:
    get:
      operationId: downloadCasePdf
      tags: [cases]
      summary: Download a filled court PDF for the case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Filled PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Case not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Unsupported state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cases/pdf-states:
    get:
      operationId: listPdfStates
      tags: [cases]
      summary: List states that support PDF generation
      responses:
        "200":
          description: Supported states
          content:
            application/json:
              schema:
                type: object
                properties:
                  states:
                    type: array
                    items:
                      type: string
                required:
                  - states

  /small-claims:
    get:
      operationId: listSmallClaims
      tags: [small-claims]
      summary: List all small claims cases
      responses:
        "200":
          description: List of small claims cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmallClaimsCase"
    post:
      operationId: createSmallClaim
      tags: [small-claims]
      summary: Create a new small claims case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSmallClaimRequest"
      responses:
        "201":
          description: Created case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmallClaimsCase"

  /small-claims/{id}:
    get:
      operationId: getSmallClaim
      tags: [small-claims]
      summary: Get a small claims case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Small claims case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmallClaimsCase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSmallClaim
      tags: [small-claims]
      summary: Update a small claims case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSmallClaimRequest"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmallClaimsCase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSmallClaim
      tags: [small-claims]
      summary: Delete a small claims case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /small-claims/{id}/generate-statement:
    post:
      operationId: generateClaimStatement
      tags: [small-claims]
      summary: Generate an AI-powered statement of claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated statement
          content:
            application/json:
              schema:
                type: object
                properties:
                  statement:
                    type: string
                required:
                  - statement

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    Grievance:
      type: object
      properties:
        id:
          type: integer
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        ownerMailingAddress:
          type: string
          nullable: true
        propertyAddress:
          type: string
        county:
          type: string
        municipality:
          type: string
        state:
          type: string
          description: "State code: NY or TX"
        schoolDistrict:
          type: string
          nullable: true
        parcelId:
          type: string
          nullable: true
        propertyClass:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        livingArea:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        taxYear:
          type: integer
        currentAssessment:
          type: number
        equalizationRate:
          type: number
          nullable: true
        estimatedMarketValue:
          type: number
        requestedAssessment:
          type: number
        basisOfComplaint:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, submitted, pending, reduced, denied]
        filingDeadline:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - ownerName
        - propertyAddress
        - county
        - municipality
        - state
        - taxYear
        - currentAssessment
        - estimatedMarketValue
        - requestedAssessment
        - status
        - createdAt
        - updatedAt

    CreateGrievanceRequest:
      type: object
      properties:
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        ownerMailingAddress:
          type: string
          nullable: true
        propertyAddress:
          type: string
        county:
          type: string
        municipality:
          type: string
        state:
          type: string
          description: "State code: NY or TX"
        schoolDistrict:
          type: string
          nullable: true
        parcelId:
          type: string
          nullable: true
        propertyClass:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        livingArea:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        taxYear:
          type: integer
        currentAssessment:
          type: number
        equalizationRate:
          type: number
          nullable: true
        estimatedMarketValue:
          type: number
        requestedAssessment:
          type: number
        basisOfComplaint:
          type: string
          nullable: true
        filingDeadline:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - ownerName
        - propertyAddress
        - county
        - municipality
        - taxYear
        - currentAssessment
        - estimatedMarketValue
        - requestedAssessment

    UpdateGrievanceRequest:
      type: object
      properties:
        ownerName:
          type: string
        ownerPhone:
          type: string
          nullable: true
        ownerEmail:
          type: string
          nullable: true
        ownerMailingAddress:
          type: string
          nullable: true
        propertyAddress:
          type: string
        county:
          type: string
        municipality:
          type: string
        state:
          type: string
          description: "State code: NY or TX"
        schoolDistrict:
          type: string
          nullable: true
        parcelId:
          type: string
          nullable: true
        propertyClass:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        livingArea:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        taxYear:
          type: integer
        currentAssessment:
          type: number
        equalizationRate:
          type: number
          nullable: true
        estimatedMarketValue:
          type: number
        requestedAssessment:
          type: number
        basisOfComplaint:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, submitted, pending, reduced, denied]
        filingDeadline:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    Comparable:
      type: object
      properties:
        id:
          type: integer
        grievanceId:
          type: integer
        address:
          type: string
        salePrice:
          type: number
        saleDate:
          type: string
        squareFeet:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: number
          nullable: true
        assessedValue:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        distance:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - grievanceId
        - address
        - salePrice
        - saleDate
        - createdAt

    CreateComparableRequest:
      type: object
      properties:
        grievanceId:
          type: integer
        address:
          type: string
        salePrice:
          type: number
        saleDate:
          type: string
        squareFeet:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: number
          nullable: true
        assessedValue:
          type: number
          nullable: true
        lotSize:
          type: string
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        distance:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - grievanceId
        - address
        - salePrice
        - saleDate

    County:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        region:
          type: string
        filingPortal:
          type: string
          nullable: true
        formRequired:
          type: string
        grievanceDay:
          type: string
          nullable: true
        deadline:
          type: string
          nullable: true
        notes:
          type: string
        municipalities:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - region
        - formRequired
        - notes
        - municipalities

    SmallClaimsCase:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
          nullable: true
        claimType:
          type: string
        state:
          type: string
        county:
          type: string
          nullable: true
        courtLocation:
          type: string
          nullable: true
        claimantName:
          type: string
        claimantEmail:
          type: string
          nullable: true
        claimantPhone:
          type: string
          nullable: true
        claimantAddress:
          type: string
          nullable: true
        defendantName:
          type: string
        defendantAddress:
          type: string
          nullable: true
        defendantEmail:
          type: string
          nullable: true
        defendantPhone:
          type: string
          nullable: true
        claimAmount:
          type: number
        claimDescription:
          type: string
        claimBasis:
          type: string
          nullable: true
        incidentDate:
          type: string
          nullable: true
        desiredOutcome:
          type: string
          nullable: true
        supportingFacts:
          type: string
          nullable: true
        generatedStatement:
          type: string
          nullable: true
        conversationId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [draft, ready, filed, dismissed, won, lost]
        filingDeadline:
          type: string
          nullable: true
        caseNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - claimType
        - state
        - claimantName
        - defendantName
        - claimAmount
        - claimDescription
        - status
        - createdAt
        - updatedAt

    CreateSmallClaimRequest:
      type: object
      properties:
        claimType:
          type: string
        state:
          type: string
        county:
          type: string
          nullable: true
        courtLocation:
          type: string
          nullable: true
        claimantName:
          type: string
        claimantEmail:
          type: string
          nullable: true
        claimantPhone:
          type: string
          nullable: true
        claimantAddress:
          type: string
          nullable: true
        defendantName:
          type: string
        defendantAddress:
          type: string
          nullable: true
        defendantEmail:
          type: string
          nullable: true
        defendantPhone:
          type: string
          nullable: true
        claimAmount:
          type: number
        claimDescription:
          type: string
        claimBasis:
          type: string
          nullable: true
        incidentDate:
          type: string
          nullable: true
        desiredOutcome:
          type: string
          nullable: true
        supportingFacts:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - claimType
        - claimantName
        - defendantName
        - claimAmount
        - claimDescription

    UpdateSmallClaimRequest:
      type: object
      properties:
        claimType:
          type: string
        state:
          type: string
        county:
          type: string
          nullable: true
        courtLocation:
          type: string
          nullable: true
        claimantName:
          type: string
        claimantEmail:
          type: string
          nullable: true
        claimantPhone:
          type: string
          nullable: true
        claimantAddress:
          type: string
          nullable: true
        defendantName:
          type: string
        defendantAddress:
          type: string
          nullable: true
        defendantEmail:
          type: string
          nullable: true
        defendantPhone:
          type: string
          nullable: true
        claimAmount:
          type: number
        claimDescription:
          type: string
        claimBasis:
          type: string
          nullable: true
        incidentDate:
          type: string
          nullable: true
        desiredOutcome:
          type: string
          nullable: true
        supportingFacts:
          type: string
          nullable: true
        generatedStatement:
          type: string
          nullable: true
        conversationId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [draft, ready, filed, dismissed, won, lost]
        filingDeadline:
          type: string
          nullable: true
        caseNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
